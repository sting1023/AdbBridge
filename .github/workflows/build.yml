name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: List repository contents
        run: |
          echo "=== Files in repo ==="
          ls -la
          echo "=== gradlew check ==="
          file gradlew
          head -3 gradlew

      - name: Build Debug APK
        run: |
          echo "=== Android SDK ==="
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT 2>/dev/null || echo "SDK not found"
          echo "=== Build ==="
          ./gradlew assembleDebug --no-daemon --no-build-cache --stacktrace 2>&1
          EXIT=$?
          echo "Build exit code: $EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "=== Looking for build output ==="
            ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK output"
            ls -la app/build/ 2>/dev/null || echo "No app/build dir"
          fi
          exit $EXIT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
